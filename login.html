<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Resume Gauntlet</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div class="auth-wrapper animate-fade-in">
    <div class="glass-card auth-card tilt-card">
      <div class="sidebar-logo" style="text-align:center; margin-bottom:30px;">RESUME GAUNTLET</div>
      <h2 style="margin-bottom: 24px; text-align:center;">Initiate Sequence</h2>
      <form id="loginForm">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="candidate@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-primary" style="width:100%; margin-top:10px;">Access Platform</button>
      </form>
      <div style="margin-top:20px; text-align:center; font-size:0.9rem; color:var(--text-dim);">
        <a href="index.html" style="color:var(--accent-cyan);">&larr; Back to Platform</a>
      </div>
    </div>
  </div>
  <script src="./js/app.js"></script>
</body>
</html>
