<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Resume Gauntlet</title>
  <link rel="stylesheet" href="./css/style.css">
</head>

<body>
  <div class="auth-wrapper animate-fade-in">
    <div class="glass-card auth-card tilt-card">
      <div class="sidebar-logo" style="text-align:center; margin-bottom:30px;">RESUME GAUNTLET</div>
      <h2 style="margin-bottom: 24px; text-align:center;">Create Account</h2>
      <form id="signupForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="name" class="form-control" required>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" class="form-control" required>
        </div>
        <div class="form-group" style="position: relative;">
          <label>Password</label>
          <input type="password" id="password" class="form-control" required style="padding-right: 40px;">
          <span class="password-toggle" onclick="togglePassword('password', this)" style="position: absolute; right: 12px; top: 38px; cursor: pointer; user-select: none;" title="Toggle Password Visibility">👁️</span>
        </div>
        <div class="form-group" style="position: relative;">
          <label>Confirm Password</label>
          <input type="password" id="confirmPassword" class="form-control" required style="padding-right: 40px;">
          <span class="password-toggle" onclick="togglePassword('confirmPassword', this)" style="position: absolute; right: 12px; top: 38px; cursor: pointer; user-select: none;" title="Toggle Password Visibility">👁️</span>
        </div>
        <button type="submit" class="btn-primary" style="width:100%; margin-top:10px;">Register Sequence</button>
        <div id="formMessage" style="margin-top: 15px; text-align: center; font-size: 0.9rem; min-height: 20px;"></div>
      </form>
      <div style="margin-top:20px; text-align:center; font-size:0.9rem; color:var(--text-dim);">
        <p style="margin-bottom: 10px;">Already have an account? <a href="login.html"
            style="color:var(--accent-cyan);">Sign In</a></p>
        <a href="index.html" style="color:var(--accent-cyan);">&larr; Back to Platform</a>
      </div>
    </div>
  </div>
  <script src="./js/app.js"></script>
  <script>
    document.getElementById('signupForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const pwd = document.getElementById('password').value;
      const confirmPwd = document.getElementById('confirmPassword').value;
      const msgDiv = document.getElementById('formMessage');

      msgDiv.style.color = 'var(--accent-danger, #ff4d6a)';

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        msgDiv.textContent = 'Please enter a valid email address.';
        return;
      }

      if (pwd !== confirmPwd) {
        msgDiv.textContent = 'Passwords do not match.';
        return;
      }

      // Store the user
      const users = JSON.parse(localStorage.getItem('registeredUsers') || '{}');
      if (users[email]) {
        msgDiv.textContent = 'User with this email already exists.';
        return;
      }

      users[email] = pwd;
      localStorage.setItem('registeredUsers', JSON.stringify(users));
      
      const userNames = JSON.parse(localStorage.getItem('userNames') || '{}');
      userNames[email] = document.getElementById('name').value.trim();
      localStorage.setItem('userNames', JSON.stringify(userNames));

      msgDiv.style.color = 'var(--accent-success, #00e676)';
      msgDiv.textContent = 'Registration successful! Redirecting...';

      setTimeout(() => {
        window.location.href = 'login.html';
      }, 1500);
    });
  </script>
</body>

</html>
