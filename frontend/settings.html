<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Resume Gauntlet</title>
  <link rel="stylesheet" href="./css/style.css">
  <style>
    .tab-btn { background: transparent; border: none; color: var(--text-dim); padding: 10px 20px; cursor: pointer; font-size: 1rem; border-bottom: 2px solid transparent; transition: all 0.3s; }
    .tab-btn.active { color: var(--accent-cyan); border-bottom-color: var(--accent-cyan); font-weight: 600; }
    .tab-content { display: none; padding-top: 30px; }
    .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">RESUME GAUNTLET</div>
      <ul class="nav-links">
        <li><a href="upload.html" class="nav-link">Dashboard</a></li>
        <li><a href="skills.html" class="nav-link">Verification</a></li>
        <li><a href="results.html" class="nav-link">Bluff Report</a></li>
        <li><a href="settings.html" class="nav-link active">Settings</a></li>
        <li style="margin-top:auto;"><a href="#" class="nav-link" onclick="logoutUser(event)">Logout</a></li>
      </ul>
    </aside>
    
    <main class="main-content animate-fade-in">
      <div style="max-width: 800px;">
        <h1 style="font-size: 2.5rem; margin-bottom: 30px;">Configuration</h1>

        <div style="border-bottom: 1px solid var(--border-glass); margin-bottom: 20px;">
          <button class="tab-btn active" onclick="switchTab(event, 'profile')">Profile</button>
          <button class="tab-btn" onclick="switchTab(event, 'support')">Support</button>
        </div>

        <div id="profile" class="tab-content active">
          <div class="glass-card" style="padding: 30px;">
            <h3 style="margin-bottom:20px;">Personal Information</h3>
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" id="profileName" class="form-control" value="Candidate Alpha" disabled style="opacity:0.7;">
            </div>
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" id="profileEmail" class="form-control" value="candidate@gauntlet.io" disabled style="opacity:0.7;">
            </div>
            <button id="editProfileBtn" class="btn-secondary" style="margin-top:10px;">Edit Profile</button>
            <div id="profileMessage" style="margin-top: 15px; text-align: left; font-size: 0.9rem; min-height: 20px;"></div>
          </div>
        </div>

        <div id="support" class="tab-content">
          <div class="glass-card" style="padding: 30px;">
            <h3 style="margin-bottom:10px;">Need Assistance?</h3>
            <p class="text-dim" style="margin-bottom:24px;">Our engineering team is ready to analyze any discrepancies in your Bluff Report.</p>
            <div class="form-group">
              <label>Subject</label>
              <input type="text" id="supportSubject" class="form-control" placeholder="Issue with verification scoring">
            </div>
            <div class="form-group">
              <label>Message</label>
              <textarea id="supportText" class="form-control" rows="5" placeholder="Describe the issue..."></textarea>
            </div>
            <button id="sendMessageBtn" class="btn-primary" style="margin-top:10px;">Send Message</button>
            <div id="supportMessage" style="margin-top: 15px; text-align: left; font-size: 0.9rem; min-height: 20px;"></div>
          </div>
        </div>

      </div>
    </main>
  </div>
  <script src="./js/app.js"></script>
  <script>
    function switchTab(e, tabId) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      e.target.classList.add('active');
    }

    // Profile Logic
    const nameInput = document.getElementById('profileName');
    const emailInput = document.getElementById('profileEmail');
    const editBtn = document.getElementById('editProfileBtn');
    const profileMsg = document.getElementById('profileMessage');

    nameInput.value = localStorage.getItem('currentUserName') || 'Candidate Alpha';
    emailInput.value = localStorage.getItem('currentUserEmail') || 'candidate@gauntlet.io';

    let isEditing = false;
    editBtn.addEventListener('click', () => {
      if (!isEditing) {
        isEditing = true;
        nameInput.disabled = false;
        emailInput.disabled = false;
        nameInput.style.opacity = '1';
        emailInput.style.opacity = '1';
        editBtn.textContent = 'Save Profile';
        editBtn.className = 'btn-primary';
        profileMsg.textContent = '';
      } else {
        isEditing = false;
        nameInput.disabled = true;
        emailInput.disabled = true;
        nameInput.style.opacity = '0.7';
        emailInput.style.opacity = '0.7';
        editBtn.textContent = 'Edit Profile';
        editBtn.className = 'btn-secondary';
        
        localStorage.setItem('currentUserName', nameInput.value);
        localStorage.setItem('currentUserEmail', emailInput.value);
        
        profileMsg.style.color = 'var(--accent-success)';
        profileMsg.textContent = 'Profile updated successfully.';
        setTimeout(() => { profileMsg.textContent = ''; }, 3000);
      }
    });

    // Support Logic
    const sendBtn = document.getElementById('sendMessageBtn');
    const supportMsg = document.getElementById('supportMessage');
    const subjInput = document.getElementById('supportSubject');
    const textInput = document.getElementById('supportText');

    sendBtn.addEventListener('click', () => {
      if (!subjInput.value.trim() || !textInput.value.trim()) {
        supportMsg.style.color = 'var(--accent-danger)';
        supportMsg.textContent = 'Please fill out both subject and message areas.';
        return;
      }
      
      sendBtn.disabled = true;
      sendBtn.textContent = 'Sending...';
      
      setTimeout(() => {
        sendBtn.disabled = false;
        sendBtn.textContent = 'Send Message';
        subjInput.value = '';
        textInput.value = '';
        supportMsg.style.color = 'var(--accent-success)';
        supportMsg.textContent = 'Message securely transmitted to engineering.';
        setTimeout(() => { supportMsg.textContent = ''; }, 4000);
      }, 800);
    });
  </script>
</body>
</html>
