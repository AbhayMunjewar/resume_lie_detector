<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Resume Gauntlet</title>
  <link rel="stylesheet" href="./css/style.css">
  <style>
    .tab-btn { background: transparent; border: none; color: var(--text-dim); padding: 10px 20px; cursor: pointer; font-size: 1rem; border-bottom: 2px solid transparent; transition: all 0.3s; }
    .tab-btn.active { color: var(--accent-cyan); border-bottom-color: var(--accent-cyan); font-weight: 600; }
    .tab-content { display: none; padding-top: 30px; }
    .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">RESUME GAUNTLET</div>
      <ul class="nav-links">
        <li><a href="upload.html" class="nav-link">Dashboard</a></li>
        <li><a href="skills.html" class="nav-link">Verification</a></li>
        <li><a href="results.html" class="nav-link">Bluff Report</a></li>
        <li><a href="settings.html" class="nav-link active">Settings</a></li>
        <li style="margin-top:auto;"><a href="index.html" class="nav-link">Logout</a></li>
      </ul>
    </aside>
    
    <main class="main-content animate-fade-in">
      <div style="max-width: 800px;">
        <h1 style="font-size: 2.5rem; margin-bottom: 30px;">Configuration</h1>

        <div style="border-bottom: 1px solid var(--border-glass); margin-bottom: 20px;">
          <button class="tab-btn active" onclick="switchTab('profile')">Profile</button>
          <button class="tab-btn" onclick="switchTab('support')">Support</button>
        </div>

        <div id="profile" class="tab-content active">
          <div class="glass-card" style="padding: 30px;">
            <h3 style="margin-bottom:20px;">Personal Information</h3>
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" class="form-control" value="Candidate Alpha" disabled style="opacity:0.7;">
            </div>
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" class="form-control" value="candidate@gauntlet.io" disabled style="opacity:0.7;">
            </div>
            <button class="btn-secondary" style="margin-top:10px;">Edit Profile</button>
          </div>
        </div>

        <div id="support" class="tab-content">
          <div class="glass-card" style="padding: 30px;">
            <h3 style="margin-bottom:10px;">Need Assistance?</h3>
            <p class="text-dim" style="margin-bottom:24px;">Our engineering team is ready to analyze any discrepancies in your Bluff Report.</p>
            <div class="form-group">
              <label>Subject</label>
              <input type="text" class="form-control" placeholder="Issue with verification scoring">
            </div>
            <div class="form-group">
              <label>Message</label>
              <textarea class="form-control" rows="5" placeholder="Describe the issue..."></textarea>
            </div>
            <button class="btn-primary" style="margin-top:10px;" onclick="alert('Message Sent')">Send Message</button>
          </div>
        </div>

      </div>
    </main>
  </div>
  <script>
    function switchTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      event.target.classList.add('active');
    }
  </script>
  <script src="./js/app.js"></script>
</body>
</html>
